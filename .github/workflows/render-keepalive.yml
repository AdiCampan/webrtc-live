name: Render keep-alive

on:
  schedule:
    # Every 10 minutes — Render free tier sleeps after ~15 min idle; GitHub cron can drift.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wake signaling server
        env:
          SIGNALING_HEALTH_URL: https://webrtc-live-ct59.onrender.com/health
        run: |
          set -euo pipefail
          echo "Pinging ${SIGNALING_HEALTH_URL}"
          # Cold starts on Render free tier can exceed 60s; retry wakes the instance then succeeds.
          response="$(
            curl -fsS \
              --http1.1 \
              --connect-timeout 30 \
              --max-time 120 \
              --retry 3 \
              --retry-delay 20 \
              --retry-all-errors \
              "${SIGNALING_HEALTH_URL}"
          )"
          echo "Response: ${response}"
          echo "${response}" | grep -q '"ok":true'
