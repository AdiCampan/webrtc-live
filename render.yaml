# Reference blueprint for Render Web Service deployment.
# Set healthCheckPath to /health in the Render dashboard if not using this file.

services:
  - type: web
    name: webrtc-live
    runtime: node
    plan: starter
    buildCommand: npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: node server/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WS_STALE_AFTER_MS
        value: "120000"
